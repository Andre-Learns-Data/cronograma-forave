<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ codigo }} — {{ titulo }} · FORAVE</title>
    <meta name="theme-color" content="#196141">
    <link rel="icon" href="/static/icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='forave.css') }}">
    <style>
        body { background-color: #f5f6fa; }
        .caixa-erro { max-width: 520px; margin: 8vh auto; text-align: center; }
        .codigo-erro {
            font-size: 5rem; font-weight: 700; line-height: 1;
            color: var(--forave-verde);
        }
    </style>
</head>
<body>
    <div class="container caixa-erro">
        <img src="{{ url_for('static', filename='forave-logo.png') }}" alt="FORAVE" style="height: 44px;" class="mb-4">
        <div class="codigo-erro">{{ codigo }}</div>
        <h1 class="h4 mt-2 mb-3">{{ titulo }}</h1>
        <p class="text-muted mb-4">{{ mensagem }}</p>
        <a href="{{ url_for('landing') }}" class="btn btn-primary">
            <i class="bi bi-house-door me-1"></i>Voltar ao início
        </a>
    </div>
</body>
</html>
